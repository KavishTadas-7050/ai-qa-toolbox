name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-cov

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run tests with coverage
        run: pytest -q --cov=ai_qa_toolbox --cov-report=term-missing

  lint:
    name: Lint check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check . --exclude .venv

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-qa-toolbox:ci .

      - name: Verify container starts
        run: |
          docker run --rm \
            -e OPENAI_API_KEY=dummy \
            ai-qa-toolbox:ci \
            python -c "from ai_qa_toolbox.core.llm.client import ask_llm; print('import OK')"
